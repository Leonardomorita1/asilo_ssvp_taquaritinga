<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transparência - Lar São Vicente de Paulo</title>
    <link rel="stylesheet" href="assets/css/pages/trans.css">
    <link rel="icon"
        href="https://www.ssvpbrasil.org.br/source/files/c/885/DECOM__-_Logotipo_SSVP_Brasil_-_azul_e_branco_01-716579_1022-1028-0-0.jpg">
    </head>

<body>
    <div id="carousel-placeholder"></div>
    <div id="header-placeholder"></div>

    <main>

        <!-- Hero -->
        <div class="page-hero">
            <div class="page-hero__inner container">
                <span class="page-hero__label">Prestação de contas</span>
                <h1 class="page-hero__title">Nossa <em>Transparência</em></h1>
                <p class="page-hero__sub">Temos o compromisso de prestar contas sobre a gestão dos recursos que recebemos, garantindo que cada doação seja utilizada de forma responsável.</p>
            </div>
            <div class="page-hero__accent" aria-hidden="true"></div>
        </div>

        <div class="container trans-body">

            <div class="transparency-toolbar fade-in-up delay-1">
                <div class="toolbar-row">
                    <div class="toolbar-col">
                        <label for="drive-sort-filter" class="toolbar-label">Ordenar por</label>
                        <select id="drive-sort-filter" class="toolbar-select">
                            <option value="recent" selected>Mais recentes</option>
                            <option value="oldest">Mais antigos</option>
                            <option value="az">Nome (A–Z)</option>
                            <option value="za">Nome (Z–A)</option>
                        </select>
                        
                    </div>
                    <div class="toolbar-col toolbar-col--right">
                        <span class="toolbar-label">Visualização</span>
                        <div class="view-toggle" role="group" aria-label="Alternar visualização">
                            <button type="button" class="view-btn active" data-drive-view="grid" aria-pressed="true">
                                <i class="bi bi-grid-3x3-gap-fill"></i> Grid
                            </button>
                            <button type="button" class="view-btn" data-drive-view="list" aria-pressed="false">
                                <i class="bi bi-view-list"></i> Lista
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="drive-frame-container fade-in-up delay-2">
                <iframe id="transparency-drive-frame" title="Documentos de Transparência" loading="lazy"></iframe>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/pages/sobre.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="assets/js/global/global.js"></script>
    <script src="assets/js/global/componentes.js"></script>

    <script>
        (function () {
            const DRIVE_FOLDER_ID = '1vpCu76AjQ8LvcNJ5HsF599hp8G_JMS00';
            const iframe      = document.getElementById('transparency-drive-frame');
            const viewButtons = document.querySelectorAll('[data-drive-view]');
            const sortSelect  = document.getElementById('drive-sort-filter');

            if (!iframe || !sortSelect) return;

            const BASE_URL = `https://drive.google.com/embeddedfolderview?id=${DRIVE_FOLDER_ID}`;
            let currentView = 'grid';
            let currentSort = 'recent';
            let reloadTimer = null;

            const sortConfig = {
                recent: { sort: '13', direction: 'd' },
                oldest: { sort: '13', direction: 'a' },
                az:     { sort: '1',  direction: 'a' },
                za:     { sort: '1',  direction: 'd' }
            };

            function buildSrc() {
                const { sort, direction } = sortConfig[currentSort] || sortConfig.recent;
                return `${BASE_URL}&sort=${sort}&direction=${direction}#${currentView}`;
            }

            function refreshIframe() {
                if (reloadTimer) clearTimeout(reloadTimer);
                iframe.classList.add('loading');
                iframe.removeAttribute('src');
                reloadTimer = setTimeout(function () {
                    iframe.src = buildSrc();
                }, 80);
            }

            iframe.addEventListener('load', function () {
                iframe.classList.remove('loading');
            });

            sortSelect.addEventListener('change', function () {
                currentSort = this.value;
                refreshIframe();
            });

            viewButtons.forEach(function (button) {
                button.addEventListener('click', function () {
                    const desiredView = button.getAttribute('data-drive-view');
                    if (desiredView === currentView) return;
                    currentView = desiredView;
                    viewButtons.forEach(function (btn) {
                        const isActive = btn === button;
                        btn.classList.toggle('active', isActive);
                        btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
                    });
                    refreshIframe();
                });
            });

            refreshIframe();
        })();
    </script>
</body>

</html>
